<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Speed Dialer – Receiver</title>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    :root {
      --bg: #1a1a2e;
      --card: #16213e;
      --accent: #0f3460;
      --green: #2ecc71;
      --red: #e74c3c;
      --blue: #3498db;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); overflow: hidden; }
    body {
      font-family: var(--font);
      display: flex;
      flex-direction: column;
      min-height: 100%;
      color: white;
    }

    /* ── WAITING SCREEN ── */
    #waiting-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
    }
    .logo { font-size: 64px; margin-bottom: 20px; }
    #waiting-screen h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    #waiting-screen p { font-size: 16px; color: rgba(255,255,255,0.6); margin-bottom: 40px; line-height: 1.5; }

    .id-card {
      background: var(--card);
      border-radius: 20px;
      padding: 28px 32px;
      margin-bottom: 32px;
      width: 100%;
      max-width: 400px;
      border: 2px solid rgba(255,255,255,0.1);
    }
    .id-label {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 12px;
    }
    .id-value {
      font-size: 32px;
      font-weight: 900;
      font-family: monospace;
      letter-spacing: 4px;
      color: #4fc3f7;
      margin-bottom: 16px;
      word-break: break-all;
    }
    .id-instructions {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      line-height: 1.5;
    }
    .btn-copy-id {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: filter 0.15s;
    }
    .btn-copy-id:hover { filter: brightness(1.1); }
    .btn-copy-id:active { filter: brightness(0.9); }

    .status-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 15px; color: rgba(255,255,255,0.5);
      margin-top: 16px;
    }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #aaa; flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.ready { background: var(--green); }
    .status-dot.error { background: var(--red); }

    /* ── INCOMING CALL ── */
    #incoming-screen {
      display: none;
      position: fixed; inset: 0;
      background: #0d0d1a;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .incoming-caller-photo, .incoming-caller-avatar {
      width: 160px; height: 160px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
      border: 5px solid rgba(255,255,255,0.2);
      animation: ringPulse 1.5s infinite;
    }
    .incoming-caller-avatar {
      display: flex; align-items: center; justify-content: center;
      font-size: 64px; font-weight: 700;
    }
    @keyframes ringPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.25); }
      50% { box-shadow: 0 0 0 24px rgba(255,255,255,0); }
    }
    .incoming-label {
      font-size: 16px; color: rgba(255,255,255,0.5);
      text-transform: uppercase; letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .incoming-caller-name { font-size: 42px; font-weight: 800; margin-bottom: 8px; }
    .incoming-call-type { font-size: 18px; color: rgba(255,255,255,0.5); margin-bottom: 64px; }
    .answer-row { display: flex; gap: 48px; align-items: flex-start; }
    .answer-col { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .btn-answer-lg, .btn-decline-lg {
      border: none; border-radius: 50%;
      width: 96px; height: 96px;
      font-size: 38px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .btn-answer-lg:active, .btn-decline-lg:active { transform: scale(0.93); }
    .btn-answer-lg { background: var(--green); box-shadow: 0 4px 24px rgba(46,204,113,0.5); }
    .btn-decline-lg { background: var(--red); box-shadow: 0 4px 24px rgba(231,76,60,0.5); }
    .answer-label { font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.7); }

    /* ── ACTIVE CALL ── */
    #active-screen {
      display: none;
      position: fixed; inset: 0;
      background: #000;
      flex-direction: column;
    }
    #remote-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: none;
    }
    #local-video {
      position: absolute;
      top: 16px; right: 16px;
      width: 110px; height: 150px;
      object-fit: cover;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.4);
      z-index: 10;
      display: none;
    }
    #remote-audio { display: none; }
    .audio-bg {
      position: absolute; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: white;
    }
    .audio-avatar-lg {
      width: 160px; height: 160px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 64px; font-weight: 700;
      margin-bottom: 20px;
      border: 4px solid rgba(255,255,255,0.2);
      color: white;
    }
    .audio-caller-name { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
    .audio-timer { font-size: 20px; color: rgba(255,255,255,0.5); }
    .active-controls {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 28px 32px 44px;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      display: flex; align-items: center; justify-content: center;
      gap: 24px; z-index: 20;
    }
    .ctrl-btn {
      background: rgba(255,255,255,0.2);
      border: none; border-radius: 50%;
      width: 62px; height: 62px; font-size: 26px; color: white;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .ctrl-btn:active { background: rgba(255,255,255,0.35); }
    .ctrl-btn.muted { background: rgba(255,255,255,0.85); color: #000; }
    .btn-end-call {
      background: var(--red);
      width: 80px; height: 80px; font-size: 30px;
      box-shadow: 0 4px 20px rgba(231,76,60,0.6);
    }
    .btn-end-call:active { filter: brightness(0.85); transform: scale(0.95); }

    /* Settings / Name Setup */
    #name-setup {
      background: var(--card);
      border-radius: 20px;
      padding: 24px;
      width: 100%; max-width: 400px;
      border: 2px solid rgba(255,255,255,0.1);
      margin-bottom: 24px;
    }
    #name-setup h3 { font-size: 18px; margin-bottom: 12px; color: rgba(255,255,255,0.8); }
    .name-row { display: flex; gap: 10px; }
    .name-input {
      flex: 1;
      padding: 12px 14px;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      font-size: 16px;
      color: white;
      outline: none;
      font-family: var(--font);
    }
    .name-input:focus { border-color: var(--blue); }
    .name-input::placeholder { color: rgba(255,255,255,0.3); }
    .btn-save-name {
      padding: 12px 16px;
      background: var(--blue);
      color: white; border: none;
      border-radius: 12px;
      font-size: 15px; font-weight: 600;
      cursor: pointer;
    }

    /* Toast */
    #toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #333; color: white;
      padding: 12px 24px; border-radius: 24px;
      font-size: 15px; z-index: 9999;
      transition: transform 0.3s; pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* COLORS (avatar) */
    .color-0 { background: #e74c3c; }
    .color-1 { background: #3498db; }
    .color-2 { background: #2ecc71; }
    .color-3 { background: #9b59b6; }
    .color-4 { background: #e67e22; }
  </style>
</head>
<body>

  <!-- ── WAITING ── -->
  <div id="waiting-screen">
    <div class="logo">📞</div>
    <h1>Speed Dialer Receiver</h1>
    <p>Keep this page open to receive calls<br>from your Speed Dialer.</p>

    <div id="name-setup">
      <h3>Your name (shown to caller):</h3>
      <div class="name-row">
        <input class="name-input" id="name-input" type="text" placeholder="e.g. Mary" maxlength="40">
        <button class="btn-save-name" id="btn-save-name">Save</button>
      </div>
    </div>

    <div class="id-card">
      <div class="id-label">Your Speed Dialer ID</div>
      <div class="id-value" id="my-id">——</div>
      <div class="id-instructions">Share this ID with whoever sets up your Speed Dialer panel. They'll add you as a contact.</div>
      <br>
      <button class="btn-copy-id" id="btn-copy-id">📋 Copy My ID</button>
    </div>

    <div class="status-row">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Connecting…</span>
    </div>
  </div>

  <!-- ── INCOMING CALL ── -->
  <div id="incoming-screen">
    <div id="incoming-caller-wrap"></div>
    <div class="incoming-label">Incoming Call</div>
    <div class="incoming-caller-name" id="incoming-name">Unknown</div>
    <div class="incoming-call-type" id="incoming-type">Video Call</div>
    <div class="answer-row">
      <div class="answer-col">
        <button class="btn-decline-lg" id="btn-decline">📵</button>
        <span class="answer-label">Decline</span>
      </div>
      <div class="answer-col">
        <button class="btn-answer-lg" id="btn-answer">📞</button>
        <span class="answer-label">Answer</span>
      </div>
    </div>
  </div>

  <!-- ── ACTIVE CALL ── -->
  <div id="active-screen">
    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay playsinline muted></video>
    <audio id="remote-audio" autoplay></audio>
    <div class="audio-bg" id="audio-bg">
      <div class="audio-avatar-lg" id="audio-avatar"></div>
      <div class="audio-caller-name" id="audio-caller-name"></div>
      <div class="audio-timer" id="call-timer">0:00</div>
    </div>
    <div class="active-controls">
      <button class="ctrl-btn" id="btn-mute">🎙️</button>
      <button class="ctrl-btn" id="btn-cam" style="display:none">📷</button>
      <button class="ctrl-btn btn-end-call" id="btn-end">📵</button>
      <button class="ctrl-btn" id="btn-speaker">🔊</button>
    </div>
  </div>

  <div id="toast"></div>

  <script>
  // ═══════════════════════════════════════════════
  // STATE
  // ═══════════════════════════════════════════════
  const state = {
    myId: null,
    myName: 'Family Member',
    peer: null,
    currentCall: null,
    localStream: null,
    callType: null,
    mutedAudio: false,
    mutedVideo: false,
    callTimerInterval: null,
    callStartTime: null,
  };

  const COLORS = ['#e74c3c','#3498db','#2ecc71','#9b59b6','#e67e22','#1abc9c'];
  function colorFor(name) {
    let n = 0;
    for (let i = 0; i < name.length; i++) n += name.charCodeAt(i);
    return COLORS[n % COLORS.length];
  }
  function initial(name) { return (name || '?')[0].toUpperCase(); }
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ═══════════════════════════════════════════════
  // STORAGE
  // ═══════════════════════════════════════════════
  function loadConfig() {
    const raw = localStorage.getItem('speedDialerReceiver');
    if (raw) {
      try {
        const d = JSON.parse(raw);
        state.myId = d.myId || makeId();
        state.myName = d.myName || 'Family Member';
      } catch(e) { state.myId = makeId(); }
    } else {
      state.myId = makeId();
    }
    document.getElementById('my-id').textContent = state.myId;
    document.getElementById('name-input').value = state.myName;
  }

  function saveConfig() {
    localStorage.setItem('speedDialerReceiver', JSON.stringify({
      myId: state.myId,
      myName: state.myName,
    }));
  }

  function makeId() {
    const chars = 'abcdefghjkmnpqrstuvwxyz23456789';
    let id = 'sd-';
    for (let i = 0; i < 6; i++) id += chars[Math.floor(Math.random() * chars.length)];
    return id;
  }

  // ═══════════════════════════════════════════════
  // PEER
  // ═══════════════════════════════════════════════
  function initPeer() {
    setStatus('connecting');
    try {
      state.peer = new Peer(state.myId, {
        debug: 0,
        config: {
          iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
          ]
        }
      });
    } catch(e) { setStatus('error'); return; }

    state.peer.on('open', () => {
      setStatus('ready');
      document.getElementById('my-id').textContent = state.myId;
    });

    state.peer.on('error', (err) => {
      if (err.type === 'unavailable-id') {
        state.myId = makeId();
        saveConfig();
        setTimeout(initPeer, 500);
        return;
      }
      setStatus('error');
      setTimeout(() => {
        if (!state.peer || state.peer.destroyed) initPeer();
      }, 5000);
    });

    state.peer.on('disconnected', () => {
      setStatus('connecting');
      setTimeout(() => { try { state.peer.reconnect(); } catch(e) { initPeer(); } }, 2000);
    });

    state.peer.on('call', (mediaConn) => {
      if (state.currentCall) {
        mediaConn.close();
        return;
      }
      const meta = mediaConn.metadata || {};
      state.currentCall = mediaConn;
      showIncoming(meta.callerName || 'Unknown', meta.callType || 'video');

      mediaConn.on('close', () => endCall());
      mediaConn.on('error', () => { endCall(); showToast('Call failed'); });
    });
  }

  function setStatus(s) {
    const dot = document.getElementById('status-dot');
    const txt = document.getElementById('status-text');
    dot.className = 'status-dot';
    if (s === 'ready') { dot.classList.add('ready'); txt.textContent = 'Ready to receive calls'; }
    else if (s === 'error') { dot.classList.add('error'); txt.textContent = 'Offline — check internet'; }
    else { txt.textContent = 'Connecting…'; }
  }

  // ═══════════════════════════════════════════════
  // INCOMING
  // ═══════════════════════════════════════════════
  function showIncoming(callerName, callType) {
    state.callType = callType;
    const wrap = document.getElementById('incoming-caller-wrap');
    wrap.innerHTML = `<div class="incoming-caller-avatar" style="background:${colorFor(callerName)};width:160px;height:160px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:64px;font-weight:700;color:white;margin-bottom:20px;animation:ringPulse 1.5s infinite">${initial(callerName)}</div>`;
    document.getElementById('incoming-name').textContent = callerName;
    document.getElementById('incoming-type').textContent = callType === 'video' ? '📹 Video Call' : '📞 Voice Call';
    document.getElementById('incoming-screen').style.display = 'flex';

    // Vibrate if supported
    if (navigator.vibrate) navigator.vibrate([500, 300, 500, 300, 500]);
  }

  async function answerCall() {
    document.getElementById('incoming-screen').style.display = 'none';
    const call = state.currentCall;
    if (!call) return;
    const callType = call.metadata?.callType || 'video';

    try {
      state.localStream = await navigator.mediaDevices.getUserMedia(
        callType === 'video'
          ? { video: { facingMode: 'user' }, audio: true }
          : { video: false, audio: true }
      );
    } catch(e) {
      state.localStream = null;
    }

    call.answer(state.localStream || new MediaStream());

    call.on('stream', (remoteStream) => {
      const callerName = call.metadata?.callerName || 'Caller';
      showActiveCall(callerName, callType, remoteStream);
    });
  }

  function declineCall() {
    if (state.currentCall) { try { state.currentCall.close(); } catch(e) {} }
    state.currentCall = null;
    document.getElementById('incoming-screen').style.display = 'none';
    showToast('Call declined');
  }

  // ═══════════════════════════════════════════════
  // ACTIVE CALL
  // ═══════════════════════════════════════════════
  function showActiveCall(callerName, callType, remoteStream) {
    const screen = document.getElementById('active-screen');
    screen.style.display = 'flex';

    if (callType === 'video') {
      const rv = document.getElementById('remote-video');
      rv.style.display = 'block';
      rv.srcObject = remoteStream;

      if (state.localStream) {
        const lv = document.getElementById('local-video');
        lv.style.display = 'block';
        lv.srcObject = state.localStream;
      }
      document.getElementById('audio-bg').style.display = 'none';
      document.getElementById('btn-cam').style.display = 'flex';
    } else {
      const ra = document.getElementById('remote-audio');
      ra.srcObject = remoteStream;
      document.getElementById('remote-video').style.display = 'none';
      document.getElementById('local-video').style.display = 'none';
      const audioBg = document.getElementById('audio-bg');
      audioBg.style.display = 'flex';
      const av = document.getElementById('audio-avatar');
      av.style.background = colorFor(callerName);
      av.textContent = initial(callerName);
      document.getElementById('audio-caller-name').textContent = callerName;
    }

    state.callStartTime = Date.now();
    clearInterval(state.callTimerInterval);
    state.callTimerInterval = setInterval(() => {
      const s = Math.floor((Date.now() - state.callStartTime) / 1000);
      const m = Math.floor(s / 60);
      document.getElementById('call-timer').textContent = `${m}:${String(s % 60).padStart(2,'0')}`;
    }, 1000);
  }

  function endCall() {
    if (state.currentCall) { try { state.currentCall.close(); } catch(e) {} }
    if (state.localStream) { state.localStream.getTracks().forEach(t => t.stop()); state.localStream = null; }
    clearInterval(state.callTimerInterval);

    ['remote-video','local-video'].forEach(id => {
      const el = document.getElementById(id);
      el.srcObject = null; el.style.display = 'none';
    });
    document.getElementById('remote-audio').srcObject = null;
    document.getElementById('active-screen').style.display = 'none';
    document.getElementById('incoming-screen').style.display = 'none';

    state.currentCall = null;
    state.callType = null;
    state.callStartTime = null;
    state.mutedAudio = false;
    state.mutedVideo = false;
    document.getElementById('btn-mute').textContent = '🎙️';
    document.getElementById('btn-mute').classList.remove('muted');
    document.getElementById('btn-cam').style.display = 'none';
    document.getElementById('audio-bg').style.display = 'flex';
  }

  // ═══════════════════════════════════════════════
  // EVENTS
  // ═══════════════════════════════════════════════
  document.getElementById('btn-answer').addEventListener('click', answerCall);
  document.getElementById('btn-decline').addEventListener('click', declineCall);
  document.getElementById('btn-end').addEventListener('click', endCall);

  document.getElementById('btn-mute').addEventListener('click', () => {
    if (!state.localStream) return;
    state.mutedAudio = !state.mutedAudio;
    state.localStream.getAudioTracks().forEach(t => t.enabled = !state.mutedAudio);
    const btn = document.getElementById('btn-mute');
    btn.textContent = state.mutedAudio ? '🔇' : '🎙️';
    btn.classList.toggle('muted', state.mutedAudio);
    showToast(state.mutedAudio ? 'Muted' : 'Unmuted');
  });

  document.getElementById('btn-cam').addEventListener('click', () => {
    if (!state.localStream) return;
    state.mutedVideo = !state.mutedVideo;
    state.localStream.getVideoTracks().forEach(t => t.enabled = !state.mutedVideo);
    const btn = document.getElementById('btn-cam');
    btn.textContent = state.mutedVideo ? '🚫' : '📷';
    btn.classList.toggle('muted', state.mutedVideo);
  });

  document.getElementById('btn-save-name').addEventListener('click', () => {
    const name = document.getElementById('name-input').value.trim();
    if (!name) return;
    state.myName = name;
    saveConfig();
    showToast(`Name set to "${name}" ✓`);
  });

  document.getElementById('btn-copy-id').addEventListener('click', () => {
    navigator.clipboard.writeText(state.myId)
      .then(() => showToast('ID copied! ✓'))
      .catch(() => showToast(state.myId));
  });

  // Toast
  let toastTimeout;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ═══════════════════════════════════════════════
  // INIT
  // ═══════════════════════════════════════════════
  loadConfig();
  initPeer();
  </script>
</body>
</html>
